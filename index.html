<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos Lounge — Меню</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ======= Стили остаются без изменений ======= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080810;--text:#f0eeff;--muted:rgba(240,238,255,0.42);--row:#0f0f1a;--row-alt:#13131f;--border:rgba(255,255,255,0.06);--tea:#1ec971;--soft:#3aacf7;--bar:#e9a43f;--hookah:#b96dff;--promo:#f04f4f;}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.4;min-height:100vh;overflow-x:hidden}
/* ... (весь твой CSS из оригинала) ... */
</style>
</head>
<body>

<!-- ======= HERO ======= -->
<section class="hero" id="top">
<div class="emblem">
<svg viewBox="0 0 100 100" fill="none">
<ellipse cx="50" cy="50" rx="46" ry="20" stroke="rgba(185,109,255,.45)" stroke-width="1.2"/>
<ellipse cx="50" cy="50" rx="46" ry="20" stroke="rgba(30,201,113,.28)" stroke-width="1.2" transform="rotate(55 50 50)"/>
<ellipse cx="50" cy="50" rx="46" ry="20" stroke="rgba(58,172,247,.22)" stroke-width="1.2" transform="rotate(110 50 50)"/>
<circle cx="96" cy="50" r="4" fill="rgba(185,109,255,.9)"/>
<circle cx="4" cy="50" r="3" fill="rgba(30,201,113,.85)"/>
<circle cx="50" cy="4" r="2.5" fill="rgba(58,172,247,.75)"/>
</svg>
<div class="emblem-core"></div>
</div>
<h1 class="hero-title">Cosmos<br>Lounge</h1>
<p class="hero-sub">Меню заведения</p>
<nav class="hero-nav">
<a href="#tea">Чай</a>
<a href="#soft">Напитки</a>
<a href="#bar">Бар</a>
<a href="#hookah">Кальян</a>
<a href="#promo">Акции</a>
</nav>
</section>

<!-- ======= SECTIONS (TEA, SOFT, BAR, HOOKAH, PROMO) ======= -->
<!-- Оставляем твой HTML с классами row, price, promo-desc без изменений -->

<!-- ======= FOOTER ======= -->
<footer class="footer">
<div class="footer-name">Cosmos Lounge</div>
<div class="footer-tag">Меню · 2026</div>
</footer>

<!-- ======= STICKY NAV ======= -->
<nav class="snav">
<a href="#tea">Чай</a>
<a href="#soft">Напитки</a>
<a href="#bar">Бар</a>
<a href="#hookah">Кальян</a>
<a href="#promo">Акции</a>
</nav>

<!-- ======= NAV SCROLL SCRIPT ======= -->
<script>
const ids = ['tea','soft','bar','hookah','promo'];
const links = document.querySelectorAll('.snav a');

function updateNav() {
const mid = window.scrollY + window.innerHeight / 3;
let current = ids[0];
for (let i = ids.length - 1; i >= 0; i--) {
const el = document.getElementById(ids[i]);
if (el && el.getBoundingClientRect().top + window.scrollY <= mid) {
current = ids[i];
break;
}
}
links.forEach(a => {
const isActive = a.getAttribute('href') === '#' + current;
a.classList.toggle('act', isActive);
});
}

links.forEach(a => {
a.addEventListener('click', e => {
e.preventDefault();
const target = document.getElementById(a.getAttribute('href').slice(1));
if (target) target.scrollIntoView({behavior: 'smooth', block: 'start'});
});
});

window.addEventListener('scroll', updateNav, {passive: true});
window.addEventListener('resize', updateNav);
updateNav();
</script>

<!-- ======= DYNAMIC PRICES SCRIPT ======= -->
<script>
async function updatePrices() {
try {
const res = await fetch('prices.json');
const data = await res.json();

// Обновляем цены в row
document.querySelectorAll('.row').forEach(row => {
const nameEl = row.querySelector('.row-name');
const priceEl = row.querySelector('.price');
if (!nameEl || !priceEl) return;

const section = row.closest('.sec');
if (!section) return;
const catId = section.id;

const newPrice = data[catId]?.[nameEl.textContent.trim()];
if (newPrice !== undefined) priceEl.textContent = newPrice + ' ₽';
});

// Обновляем акции
document.querySelectorAll('#promo .promo-desc').forEach(desc => {
const text = desc.textContent;
for (const [key, value] of Object.entries(data.promo)) {
if (text.includes(key)) {
desc.innerHTML = desc.innerHTML.replace(/(\d+\s?₽)/, value + ' ₽');
}
}
});

} catch (e) {
console.error('Не удалось загрузить цены:', e);
}
}

// Сразу при загрузке страницы
updatePrices();

// Можно обновлять каждые 30 секунд
setInterval(updatePrices, 30000);
</script>

</body>
</html>
